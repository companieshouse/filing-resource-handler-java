spring.kafka.bootstrap-servers=${BOOTSTRAP_SERVER_URL:localhost:9092}
maximum.retry.attempts=5
retry.throttle.rate.milliseconds=1000
consumer.concurrency=${CONCURRENT_LISTENER_INSTANCES:1}
message.send.topic=${FILING_RECEIVED_TOPIC:filing-received}
message.receive.topic=${TX_CLOSED:tx-closed}
message.group.name=${GROUP_ID:filing-resource-handler}
management.endpoints.enabled-by-default=false
management.endpoints.web.base-path=/
management.endpoints.web.path-mapping.health=healthcheck
management.endpoint.health.show-details=never
management.endpoint.health.enabled=true
management.health.mongo.enabled=false
